<div class="min-h-screen bg-emerald-50 py-10 px-4 sm:px-6 lg:px-8">
  <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl border border-emerald-100 overflow-hidden">

    <!-- Loading -->
    <div *ngIf="!employee" class="text-center py-24">
      <div class="inline-flex flex-col items-center gap-5 animate-pulse">
        <div class="w-32 h-32 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
        <div class="h-5 w-64 bg-gray-300 dark:bg-gray-700 rounded"></div>
        <div class="h-4 w-48 bg-gray-300 dark:bg-gray-700 rounded"></div>
      </div>
    </div>

    <ng-container *ngIf="employee ">

      <!-- Header / Hero -->
      <div class="bg-emerald-300 rounded-b-3xl shadow-xl overflow-hidden mb-10">
        <div class="px-6 py-10 md:px-10 md:py-14 flex flex-col md:flex-row items-center md:items-start gap-8 md:gap-12">
          
          <!-- Avatar + basic info -->
          <div class="flex flex-col items-center md:items-start text-center md:text-left">
            <div class="relative mb-6">
              <img
                [src]="'https://ui-avatars.com/api/?name=' + fullName + '&background=a7f3d0&color=111827&size=256&bold=true'"
                alt="Profile picture"
                class="w-40 h-40 md:w-48 md:h-48 rounded-full object-cover border-4 border-white/40 shadow-xl ring-2 ring-white/25 transition hover:scale-105 duration-300"
              />
              <span class="absolute -bottom-1 -right-1 px-3.5 py-1 text-xs font-semibold bg-emerald-400 text-emerald-950 rounded-full shadow border-2 border-white">
                Active  
              </span>
            </div>

            <h1 class="text-3xl md:text-4xl font-bold text-black tracking-tight">
              {{ fullName }}
            </h1>

            <p class="mt-2 text-black text-lg md:text-xl font-medium">
              {{ employee.jobTile || '—' }}
            </p>
          </div>

          <!-- Quick actions -->
          <div class="md:ml-auto flex gap-4 mt-6 md:mt-0">
            <button [routerLink]="['edit-employee-profile']" 
              class="px-6 py-2.5 bg-white/90 text-black font-semibold rounded-full shadow-lg hover:bg-emerald-50 focus:outline-none focus:ring-2 focus:ring-emerald-200 transition-colors border border-emerald-100 inline-flex items-center gap-2"
            >
              <span class="inline-block h-2 w-2 rounded-full bg-emerald-400 shadow-sm"></span>
              Edit Profile
            </button>
          </div>
        </div>
      </div>

      <!-- Info Cards -->
      <div class="px-4 pb-10 md:px-6 md:pb-12 bg-emerald-50">

        <!-- Employee Information -->
        <div class="bg-white rounded-2xl shadow-md border border-emerald-100 overflow-hidden">
          <div class="px-6 py-5 border-b border-emerald-100 bg-emerald-100 flex items-center gap-2">
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-white text-black text-sm font-semibold">
              ID
            </span>
            <h2 class="text-lg font-semibold text-black">Employee Information</h2>
          </div>

          <div class="p-6 space-y-6">

            <div class="grid grid-cols-2 gap-6">
              <div>
              <label class="block text-sm font-medium text-gray-600">Employee #</label>
              <p class="mt-1.5 text-black font-medium">
                  {{ employee.employeeNumber }}
                </p>
              </div>

              <div>
              <label class="block text-sm font-medium text-gray-600">Age</label>
              <p class="mt-1.5 text-black font-medium">
                  {{ employee.age }}
                </p>
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-600">Full Name</label>
              <p class="mt-1.5 text-black font-medium">
                {{ fullName }}
              </p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600">Email</label>
              <p class="mt-1.5 text-black font-medium break-all">
                {{ employee.email }}
              </p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-600">Phone</label>
              <p class="mt-1.5 text-black font-medium">
                {{ employee.phone || '—' }}
              </p>
            </div>

          </div>
        </div>

      </div>

    </ng-container>

  </div>
</div>
